<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joker Xue · 薛之谦 | AI 风格画廊</title>
<style>
  :root {
    --bg-deep: #0a0a0a;
    --bg-card: rgba(20, 20, 20, 0.55);
    --red-dark: #8b0000;
    --red-glow: #a31010;
    --gold: #c9a96e;
    --gold-dim: #8b7846;
    --text-primary: #e8e8e8;
    --text-secondary: #a0a0a0;
    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-gold: rgba(201, 169, 110, 0.35);
    --radius-card: 14px;
    --radius-img: 10px;
    --transition-smooth: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--bg-deep);
    color: var(--text-primary);
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== Fade-in Animation ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeInUp 0.9s ease both;
  }
  .fade-in:nth-child(1) { animation-delay: 0.1s; }
  .fade-in:nth-child(2) { animation-delay: 0.2s; }
  .fade-in:nth-child(3) { animation-delay: 0.3s; }
  .fade-in:nth-child(4) { animation-delay: 0.4s; }
  .fade-in:nth-child(5) { animation-delay: 0.5s; }
  .fade-in:nth-child(6) { animation-delay: 0.6s; }
  .fade-in:nth-child(7) { animation-delay: 0.7s; }
  .fade-in:nth-child(8) { animation-delay: 0.8s; }

  .fade-in-stagger {
    animation: fadeInUp 0.8s ease both;
  }

  @keyframes sectionFadeIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section-reveal {
    animation: sectionFadeIn 0.7s ease both;
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(ellipse at 50% 35%, #1a0505 0%, #0d0000 45%, var(--bg-deep) 75%);
    overflow: hidden;
    padding: 2rem;
  }

  /* Particles / Stars */
  #particles-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 720px;
  }

  .hero h1 {
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    color: var(--text-primary);
    text-shadow: 0 0 60px rgba(139, 0, 0, 0.5), 0 0 120px rgba(201, 169, 110, 0.18);
    margin-bottom: 0.5rem;
  }

  .hero h1 .joker {
    color: var(--red-dark);
    text-shadow: 0 0 40px rgba(139, 0, 0, 0.7);
  }

  .hero .subtitle {
    font-size: 1.15rem;
    color: var(--gold);
    letter-spacing: 0.06em;
    font-weight: 400;
    opacity: 0;
    animation: fadeInUp 0.9s 0.35s ease both;
  }

  .hero-divider {
    width: 80px;
    height: 2px;
    background: var(--gold);
    margin: 1.2rem auto;
    opacity: 0.6;
    border-radius: 1px;
  }

  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    opacity: 0;
    animation: fadeInUp 0.9s 1s ease both;
  }

  .scroll-hint span {
    display: block;
    width: 22px;
    height: 22px;
    border-right: 2px solid var(--gold-dim);
    border-bottom: 2px solid var(--gold-dim);
    transform: rotate(45deg);
    margin: 0 auto;
    opacity: 0.5;
    animation: scrollBounce 2s ease-in-out infinite;
  }

  @keyframes scrollBounce {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50%      { transform: rotate(45deg) translateY(8px); }
  }

  /* ===== Section Common ===== */
  .section {
    max-width: 1240px;
    margin: 0 auto;
    padding: 5rem 2rem 4rem;
  }

  .section-title {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 0.4rem;
    letter-spacing: 0.03em;
  }

  .section-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.95rem;
    margin-bottom: 3rem;
  }

  /* ===== Poster Gallery Grid ===== */
  .poster-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.8rem;
  }

  .poster-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-card);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
    transition: transform var(--transition-smooth), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
    cursor: pointer;
  }

  .poster-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--border-gold);
    box-shadow: 0 18px 50px rgba(139, 0, 0, 0.18), 0 4px 12px rgba(0,0,0,0.5);
  }

  .poster-card-img {
    width: 100%;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    display: block;
    background: #141414;
    transition: transform 0.5s ease;
  }

  .poster-card:hover .poster-card-img {
    transform: scale(1.06);
  }

  .poster-card-body {
    padding: 1rem 1.2rem;
  }

  .poster-card-tag {
    display: inline-block;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    color: var(--gold);
    background: rgba(201, 169, 110, 0.08);
    border: 1px solid rgba(201, 169, 110, 0.2);
    border-radius: 20px;
    padding: 0.25rem 0.85rem;
  }

  /* ===== Real Moments ===== */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }

  .photo-item {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 8px;
    cursor: pointer;
    background: #141414;
    border: 1px solid var(--border-subtle);
    transition: transform var(--transition-smooth), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
  }

  .photo-item:hover {
    transform: scale(1.04);
    border-color: var(--border-gold);
    box-shadow: 0 8px 28px rgba(139, 0, 0, 0.2);
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.45s ease;
  }

  .photo-item:hover img {
    transform: scale(1.08);
  }

  .photo-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);
    opacity: 0;
    transition: opacity var(--transition-smooth);
    pointer-events: none;
  }

  .photo-item:hover::after {
    opacity: 1;
  }

  /* ===== Lightbox ===== */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox-content {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
  }

  .lightbox-content img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .lightbox-close {
    position: absolute;
    top: -44px;
    right: 0;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 2rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    line-height: 1;
  }

  .lightbox-close:hover { opacity: 1; }

  .lightbox-prev,
  .lightbox-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(20,20,20,0.7);
    border: 1px solid var(--border-subtle);
    color: var(--text-primary);
    font-size: 1.6rem;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: opacity 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .lightbox-prev:hover,
  .lightbox-next:hover {
    opacity: 1;
    background: rgba(30,30,30,0.85);
  }

  .lightbox-prev { left: -60px; }
  .lightbox-next { right: -60px; }

  /* ===== Footer ===== */
  .site-footer {
    text-align: center;
    padding: 3rem 2rem 2.5rem;
    max-width: 1240px;
    margin: 0 auto;
  }

  .footer-divider {
    width: 140px;
    height: 1.5px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 0 auto 1.8rem;
    border-radius: 1px;
  }

  .site-footer p {
    color: var(--text-secondary);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    opacity: 0.7;
  }

  .site-footer .gold-accent {
    color: var(--gold);
  }

  /* ===== Responsive ===== */
  @media (max-width: 1024px) {
    .poster-grid { grid-template-columns: repeat(2, 1fr); gap: 1.4rem; }
    .photo-grid  { grid-template-columns: repeat(3, 1fr); gap: 0.8rem; }
    .lightbox-prev { left: -50px; }
    .lightbox-next { right: -50px; }
  }

  @media (max-width: 640px) {
    .poster-grid { grid-template-columns: 1fr; gap: 1.2rem; }
    .photo-grid  { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }

    .section { padding: 3rem 1.2rem 2.5rem; }
    .section-title { font-size: 1.4rem; }

    .hero h1 { font-size: 2rem; }
    .hero .subtitle { font-size: 1rem; }

    .lightbox-prev { left: 8px; width: 40px; height: 40px; font-size: 1.3rem; }
    .lightbox-next { right: 8px; width: 40px; height: 40px; font-size: 1.3rem; }
    .lightbox-close { top: -38px; font-size: 1.6rem; }
  }
</style>
</head>
<body>

<!-- ===== Hero ===== -->
<header class="hero">
  <canvas id="particles-canvas"></canvas>
  <div class="hero-content">
    <h1><span class="joker">Joker</span> Xue · 薛之谦</h1>
    <p class="subtitle">AI 风格画廊 | 粉丝收藏</p>
    <div class="hero-divider"></div>
  </div>
  <div class="scroll-hint"><span></span></div>
</header>

<!-- ===== AI Poster Gallery ===== -->
<section class="section section-reveal">
  <h2 class="section-title">AI 风格海报</h2>
  <p class="section-subtitle">七种风格，七面 Joker</p>
  <div class="poster-grid">

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_ink.jpg" alt="水墨画风 · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">水墨画风</span>
      </div>
    </div>

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_anime.jpg" alt="日系动漫 · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">日系动漫</span>
      </div>
    </div>

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_joker.jpg" alt="暗黑Joker · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">暗黑Joker</span>
      </div>
    </div>

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_cyberpunk.jpg" alt="赛博朋克 · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">赛博朋克</span>
      </div>
    </div>

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_retro.jpg" alt="港风复古 · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">港风复古</span>
      </div>
    </div>

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_tianwai.jpg" alt="天外来物 · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">天外来物</span>
      </div>
    </div>

    <div class="poster-card fade-in">
      <img class="poster-card-img" src="posters/poster_wanshou.jpg" alt="万兽之王 · 薛之谦" loading="lazy">
      <div class="poster-card-body">
        <span class="poster-card-tag">万兽之王</span>
      </div>
    </div>

  </div>
</section>

<!-- ===== Real Moments ===== -->
<section class="section section-reveal">
  <h2 class="section-title">真实瞬间</h2>
  <p class="section-subtitle">演唱会 · 活动现场 · 粉丝捕捉</p>
  <div class="photo-grid" id="photoGrid">
  </div>
</section>

<!-- ===== Lightbox ===== -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev" aria-label="上一张">&#10094;</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-next" id="lightboxNext" aria-label="下一张">&#10095;</button>
  </div>
</div>

<!-- ===== Footer ===== -->
<footer class="site-footer section-reveal">
  <div class="footer-divider"></div>
  <p><span class="gold-accent">Joker Xue Fan Gallery</span> · Generated with AI · 2026</p>
</footer>

<script>
/* ===== Particle / Star Animation ===== */
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;

  function resize() {
    w = canvas.width  = canvas.offsetWidth;
    h = canvas.height = canvas.offsetHeight;
  }

  function createParticles() {
    const count = Math.floor((w * h) / 8000);
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.4 + 0.3,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        opacity: Math.random() * 0.6 + 0.15,
        pulseSpeed: Math.random() * 0.015 + 0.005,
        pulseOffset: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(timestamp) {
    ctx.clearRect(0, 0, w, h);

    for (const p of particles) {
      const alpha = p.opacity + Math.sin(timestamp * p.pulseSpeed + p.pulseOffset) * 0.15;
      const finalAlpha = Math.max(0.05, Math.min(0.85, alpha));

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,169,110,${finalAlpha.toFixed(3)})`;
      ctx.fill();

      // Occasional faint red glow
      if (p.r > 0.9 && finalAlpha > 0.4) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(139,0,0,${(finalAlpha * 0.25).toFixed(3)})`;
        ctx.fill();
      }

      p.x += p.vx;
      p.y += p.vy;

      if (p.x < -10) p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      if (p.y < -10) p.y = h + 10;
      if (p.y > h + 10) p.y = -10;
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createParticles(); });
  resize();
  createParticles();
  requestAnimationFrame(draw);
})();

/* ===== Photo Grid Generator ===== */
(function() {
  const grid = document.getElementById('photoGrid');
  const totalPhotos = 16;
  let html = '';

  for (let i = 1; i <= totalPhotos; i++) {
    const num = String(i).padStart(2, '0');
    html += `
      <div class="photo-item fade-in-stagger" data-index="${i - 1}">
        <img src="photos/xzq_${num}.jpg" alt="薛之谦 现场 ${i}" loading="lazy">
      </div>`;
  }

  grid.innerHTML = html;
})();

/* ===== Lightbox ===== */
(function() {
  const photoItems = () => document.querySelectorAll('.photo-item img');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const closeBtn = document.getElementById('lightboxClose');
  const prevBtn = document.getElementById('lightboxPrev');
  const nextBtn = document.getElementById('lightboxNext');

  let currentIndex = 0;
  let images = [];

  function refreshImages() {
    images = Array.from(photoItems());
  }

  function open(index) {
    refreshImages();
    if (images.length === 0) return;
    currentIndex = index;
    lightboxImg.src = '';
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  function prev() {
    refreshImages();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
  }

  function next() {
    refreshImages();
    currentIndex = (currentIndex + 1) % images.length;
    lightboxImg.src = images[currentIndex].src;
    lightboxImg.alt = images[currentIndex].alt;
  }

  // Delegate click on photo grid
  document.getElementById('photoGrid').addEventListener('click', (e) => {
    const photoItem = e.target.closest('.photo-item');
    if (!photoItem) return;
    const idx = parseInt(photoItem.dataset.index, 10);
    open(idx);
  });

  closeBtn.addEventListener('click', close);
  prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
  nextBtn.addEventListener('click', (e) => { e.stopPropagation(); next(); });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });
})();
</script>

</body>
</html>
